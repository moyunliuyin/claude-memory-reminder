name: Bug Report
description: Report a bug or unexpected behavior in the skill
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing a bug report. Please fill in the fields below so we can reproduce quickly.

  - type: input
    id: version
    attributes:
      label: Skill version / commit
      description: Git commit hash (`git rev-parse HEAD`) or release tag if installed from release.
      placeholder: e.g., v0.1.0 or abc1234
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: OS + version
      placeholder: e.g., Windows 11 Pro, macOS 15.3, Ubuntu 24.04
    validations:
      required: true

  - type: input
    id: bash
    attributes:
      label: bash version
      description: First line of `bash --version`
      placeholder: e.g., GNU bash, version 5.2.21(1)-release
    validations:
      required: true

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Describe the unexpected behavior.
      placeholder: The hook printed SKIP even though 10h have passed since last session...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Install per README Step 1-5
        2. Open a new Claude Code session
        3. Say "remind me to X"
        4. Close the session
        5. Open another session 10 hours later
        6. Observe: ...
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant hook output or logs
      render: shell
      description: Output of `bash ~/.claude/hooks/session-start.sh`, or any error messages Claude showed.

  - type: textarea
    id: config
    attributes:
      label: Your `config.json` (if customized)
      render: json
