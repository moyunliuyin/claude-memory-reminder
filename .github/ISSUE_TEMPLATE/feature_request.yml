name: Feature Request
description: Suggest a new feature or improvement
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the suggestion! Please describe what you want and why.

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: The use case or pain point. What are you trying to do that's currently awkward?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How would you implement or use it?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other ways you thought about solving this.

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Screenshots, related links, prior art from other tools, etc.
